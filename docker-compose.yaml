services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    volumes:
      - ollama_storage:/data

  # Scarica il modello all'avvio
  ollama-puller:
    image: curlimages/curl:latest
    depends_on:
      - ollama
    command: >
      ${OLLAMA_HOST:-http://ollama:11434}/api/pull -d '{"name": "${LLM_MODEL:-llama3.2:1b}"}'

  app:
    build: .
    container_name: llm_app
    stdin_open: true
    tty: true
    depends_on:
      ollama-puller:
        condition: service_completed_successfully
    environment:
      - TRACELOOP_API_KEY=${TRACELOOP_API_KEY}
      - LLM_MODEL=${LLM_MODEL:-llama3.2:1b}
      - OLLAMA_HOST=${OLLAMA_HOST:-http://ollama:11434}

volumes:
  ollama_storage:
